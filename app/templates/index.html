<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Property Price Estimator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f6fb;
}

/* HERO */

.hero{
height:45vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1560518883-ce09059eeffa");
background-size:cover;
background-position:center;
color:white;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* FORM CONTAINER */

.form-container{
display:flex;
justify-content:center;
margin-top:-70px;
padding:20px;
}

.card{

background:white;
width:760px;
padding:40px;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.12);

}

/* TITLE */

.title{
font-size:24px;
font-weight:600;
text-align:center;
margin-bottom:25px;
color:#333;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* INPUTS */

input{
padding:12px;
border-radius:7px;
border:1px solid #ddd;
font-size:14px;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

/* BUTTON */

button{

margin-top:20px;
width:100%;
padding:14px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

button:hover{
background:#2563eb;
}

/* RESULT */

.result{

margin-top:20px;
padding:16px;
border-radius:8px;
background:#eef4ff;
text-align:center;
font-size:18px;
font-weight:600;
color:#2563eb;

}

</style>
</head>

<body>

<section class="hero">

<div>
<h1>Property Price Estimator</h1>
<p>Estimate property value based on family and housing details</p>
</div>

</section>


<div class="form-container">

<div class="card">

<div class="title">Enter Property Information</div>

<form action="/predict" method="post">

<div class="grid">

<input type="number" name="income" placeholder="Family Monthly Income" required>

<input type="number" name="family_members" placeholder="Family Members" required>

<input type="number" name="bedrooms" placeholder="Bedrooms Needed" required>

<input type="number" name="house_size" placeholder="House Size (sqft)" required>

<input type="number" name="location_score" placeholder="Location Score (1-10)" required>

<input type="number" name="distance_city" placeholder="Distance From City (km)" required>

<input type="number" name="house_age" placeholder="House Age (years)" required>

<input type="number" name="facilities" placeholder="Nearby Facilities Score (1-10)" required>

</div>

<button type="submit">Predict Property Price</button>

</form>

{% if prediction_text %}

<div class="result">
{{ prediction_text }}
</div>

{% endif %}

</div>

</div>

</body>
</html>

<footer style="margin-top:50px; padding:20px; text-align:center; background:#f5f7fb; border-radius:10px;">
    <p style="margin:5px; font-weight:600;">House Price Prediction System</p>
    <p style="margin:5px; color:#666;">Developed by Krishnakant Chaubey & Deepak Sardana</p>
    <p style="margin:5px; font-size:13px; color:#999;">Machine Learning Project • 2026</p>
</footer>
