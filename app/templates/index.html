<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House Price Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#333;
}

.container{
    width:420px;
    background:white;
    border-radius:12px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    animation:fadeIn 0.8s ease-in-out;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:24px;
    color:#2c3e50;
}

.title p{
    font-size:13px;
    color:#777;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#3498db;
    box-shadow:0 0 5px rgba(52,152,219,0.3);
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:linear-gradient(45deg,#3498db,#2ecc71);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.result{
    margin-top:20px;
    padding:12px;
    border-radius:6px;
    background:#ecf9f1;
    text-align:center;
    font-weight:bold;
    color:#27ae60;
}

.footer{
    margin-top:20px;
    text-align:center;
    font-size:12px;
    color:#888;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>🏠 House Price Predictor</h1>
<p>Machine Learning Web Application</p>
</div>

<form action="/predict" method="post">

<div class="input-group">
<label>Median Income</label>
<input type="text" name="income" placeholder="e.g. 8.3252" required>
</div>

<div class="input-group">
<label>House Age</label>
<input type="text" name="age" placeholder="e.g. 41" required>
</div>

<div class="input-group">
<label>Average Rooms</label>
<input type="text" name="rooms" placeholder="e.g. 6.98" required>
</div>

<div class="input-group">
<label>Population</label>
<input type="text" name="population" placeholder="e.g. 322" required>
</div>

<button type="submit">Predict Price</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

<div class="footer">
Created with Flask & Scikit-Learn
</div>

</div>

</body>
</html>
